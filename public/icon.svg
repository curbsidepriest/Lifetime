<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="lt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.55" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background (safe for "any maskable") -->
  <rect width="512" height="512" rx="112" fill="url(#lt)"/>
  <!-- The year ring (the rolling 12-month cycle) -->
  <circle cx="256" cy="256" r="132" fill="none" stroke="#fff" stroke-width="34" stroke-linecap="round"/>
  <!-- Focal centre (now / you) -->
  <circle cx="256" cy="256" r="43" fill="#fff"/>
  <!-- A marked moment orbiting the year -->
  <circle cx="349" cy="163" r="40" fill="#fff"/>
  <circle cx="349" cy="163" r="19" fill="url(#lt)"/>
</svg>
